name: CI - Lint, Build, and Smoke Tests

on:
  push:
    branches: [main, feat/*, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22.x"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: |
          npm run dev &
          sleep 5
        timeout-minutes: 2

      - name: Run smoke tests
        run: npm run test:smoke --if-present
        continue-on-error: true

      - name: Verify routes accessible
        run: |
          echo "Testing critical routes..."
          curl -f http://localhost:3000/auth/signin || echo "Warning: /auth/signin returned non-200"
          echo "Smoke tests completed"

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # Status check job to ensure all critical jobs passed
  status-check:
    needs: [lint-and-build, type-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        if: needs.lint-and-build.result != 'success'
        run: |
          echo "Build failed. Please check the logs above."
          exit 1

      - name: Check TypeScript status
        if: needs.type-check.result != 'success'
        run: |
          echo "TypeScript check failed. Please check the logs above."
          exit 1

      - name: All checks passed
        run: echo "✓ All CI checks passed"
